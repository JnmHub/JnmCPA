name: PR Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend regression suite
        run: |
          go test ./internal/api \
            ./internal/api/handlers/management \
            ./internal/authdeletestats \
            ./internal/store \
            ./internal/config \
            ./sdk/cliproxy/auth \
            ./sdk/cliproxy \
            ./internal/registry \
            ./sdk/api/handlers/openai \
            ./internal/runtime/executor \
            ./internal/translator/codex/openai/chat-completions \
            ./internal/translator/codex/gemini \
            ./internal/translator/antigravity/claude

      - name: Build server
        run: go build ./cmd/server

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: static/Cli-Proxy-API-Management-Center-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: static/Cli-Proxy-API-Management-Center-main
        run: npm ci

      - name: Run frontend type-check
        working-directory: static/Cli-Proxy-API-Management-Center-main
        run: npm run type-check

      - name: Build frontend
        working-directory: static/Cli-Proxy-API-Management-Center-main
        run: npm run build
